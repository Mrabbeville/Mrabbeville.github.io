<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Character Stat Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #11111b; /* Darker background to separate sheets */
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
            color: #89b4fa;
            margin-bottom: 30px;
        }
        .character-sheet {
            background-color: #1e1e2e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            max-width: 1000px;
            width: 100%;
        }
        .name-input {
            width: 100%;
            font-size: 24px;
            font-weight: bold;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #181825;
            color: #cdd6f4;
            border: 1px solid #585b70;
            border-radius: 8px;
            text-align: center;
            box-sizing: border-box;
        }
        .name-input::placeholder {
            color: #6c7086;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap; /* Allows stacking on smaller screens */
        }
        .card {
            background-color: #313244;
            border-radius: 10px;
            padding: 20px;
            flex: 1;
            min-width: 250px; /* Prevents columns from getting too squished */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .card h2 {
            text-align: center;
            margin-top: 0;
            border-bottom: 2px solid #585b70;
            padding-bottom: 10px;
            font-size: 20px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #585b70;
            background-color: #45475a;
            color: #cdd6f4;
            box-sizing: border-box;
        }
        .multiplier-group {
            margin-top: auto;
            border-top: 1px dashed #585b70;
            padding-top: 15px;
        }
        .tracker-panel {
            margin-top: 20px;
            background-color: #181825;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .max-stat {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .max-willpower { color: #89b4fa; }
        .max-health { color: #a6e3a1; }
        .max-chakra { color: #cba6f7; }
        
        .current-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .current-group label {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
        }
        .current-group input {
            width: 70px;
            font-size: 16px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Party Stat Tracker</h1>
    <div id="app"></div>

    <script>
        const totalCharacters = 10;
        const appContainer = document.getElementById('app');

        // Safely reads base stats so blank boxes calculate as 0
        function getStat(id) {
            const val = parseFloat(document.getElementById(id).value);
            return isNaN(val) ? 0 : val;
        }

        // Safely reads multipliers so blank boxes calculate as 1
        function getMult(id) {
            const val = parseFloat(document.getElementById(id).value);
            return isNaN(val) ? 1 : val;
        }

        // Calculation logic for a specific character index
        function calculate(i) {
            // Willpower
            const int = getStat(`int-${i}`);
            const awa = getStat(`awa-${i}`);
            const cha = getStat(`cha-${i}`);
            const willpowerBase = Math.ceil((int + awa + cha) / 3);
            document.getElementById(`willpower-max-${i}`).innerText = 'Max Willpower: ' + willpowerBase;

            // Health
            const dex = getStat(`dex-${i}`);
            const ste = getStat(`ste-${i}`);
            const sur = getStat(`sur-${i}`);
            const healthMult = getMult(`health-mult-${i}`);
            const healthBase = Math.ceil((dex + ste + sur) / 3);
            const healthTotal = Math.ceil(healthBase * healthMult);
            document.getElementById(`health-max-${i}`).innerText = 'Max Health: ' + healthTotal;

            // Chakra
            const con = getStat(`con-${i}`);
            const pot = getStat(`pot-${i}`);
            const flo = getStat(`flo-${i}`);
            const chakraMult = getMult(`chakra-mult-${i}`);
            const chakraBase = Math.ceil((con + pot + flo) / 3);
            const chakraTotal = Math.ceil(chakraBase * chakraMult);
            document.getElementById(`chakra-max-${i}`).innerText = 'Max Chakra: ' + chakraTotal;
        }

        // Generate the HTML for all 10 characters dynamically
        let htmlContent = '';
        
        for (let i = 1; i <= totalCharacters; i++) {
            htmlContent += `
            <div class="character-sheet">
                <input type="text" class="name-input" placeholder="Character ${i} Name">
                <div class="container">
                    
                    <!-- WILLPOWER COLUMN -->
                    <div class="card">
                        <h2>Willpower</h2>
                        <div class="input-group">
                            <label>Intelligence</label>
                            <input type="number" id="int-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Awareness</label>
                            <input type="number" id="awa-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Charisma</label>
                            <input type="number" id="cha-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        
                        <div class="tracker-panel">
                            <div class="max-stat max-willpower" id="willpower-max-${i}">Max Willpower: 0</div>
                            <div class="current-group">
                                <label>Current:</label>
                                <input type="number" id="willpower-curr-${i}" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- HEALTH COLUMN -->
                    <div class="card">
                        <h2>Health</h2>
                        <div class="input-group">
                            <label>Dexterity</label>
                            <input type="number" id="dex-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Stealth</label>
                            <input type="number" id="ste-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Survival</label>
                            <input type="number" id="sur-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group multiplier-group">
                            <label>Health Multiplier</label>
                            <input type="number" id="health-mult-${i}" value="1" step="0.1" oninput="calculate(${i})">
                        </div>
                        
                        <div class="tracker-panel">
                            <div class="max-stat max-health" id="health-max-${i}">Max Health: 0</div>
                            <div class="current-group">
                                <label>Current:</label>
                                <input type="number" id="health-curr-${i}" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- CHAKRA COLUMN -->
                    <div class="card">
                        <h2>Chakra</h2>
                        <div class="input-group">
                            <label>Control</label>
                            <input type="number" id="con-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Potency</label>
                            <input type="number" id="pot-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group">
                            <label>Flow</label>
                            <input type="number" id="flo-${i}" value="0" oninput="calculate(${i})">
                        </div>
                        <div class="input-group multiplier-group">
                            <label>Chakra Multiplier</label>
                            <input type="number" id="chakra-mult-${i}" value="1" step="0.1" oninput="calculate(${i})">
                        </div>
                        
                        <div class="tracker-panel">
                            <div class="max-stat max-chakra" id="chakra-max-${i}">Max Chakra: 0</div>
                            <div class="current-group">
                                <label>Current:</label>
                                <input type="number" id="chakra-curr-${i}" value="0">
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // Inject into the page
        appContainer.innerHTML = htmlContent;

        // Run calculation once for all characters so numbers don't sit empty
        for (let i = 1; i <= totalCharacters; i++) {
            calculate(i);
        }
    </script>

</body>
</html>
